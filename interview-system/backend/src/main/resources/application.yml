server:
  port: 8080

spring:
  application:
    name: interview-system

  datasource:
    # H2 文件数据库，数据持久化到 ./data/interview 目录
    url: jdbc:h2:file:./data/interview;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false   # 生产安全：默认关闭，开发时改为 true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update   # 自动建表，数据不丢失
    show-sql: false
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
